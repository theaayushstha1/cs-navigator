server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to Cloud Run backend
    location /api/ {
        proxy_pass https://csnavigator-backend-750361124802.us-central1.run.app;
        proxy_http_version 1.1;
        proxy_set_header Host csnavigator-backend-750361124802.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # Proxy chat endpoints
    location /chat {
        proxy_pass https://csnavigator-backend-750361124802.us-central1.run.app;
        proxy_http_version 1.1;
        proxy_set_header Host csnavigator-backend-750361124802.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # Proxy other backend routes
    location ~ ^/(sessions|chat-history|uploads|degreeworks) {
        proxy_pass https://csnavigator-backend-750361124802.us-central1.run.app;
        proxy_http_version 1.1;
        proxy_set_header Host csnavigator-backend-750361124802.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
