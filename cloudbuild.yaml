# =============================================================================
# Cloud Build CI/CD Configuration for CSNavigator
# =============================================================================
# Automatically builds and deploys on push to main branch
#
# Setup:
#   1. Connect your GitHub repo to Cloud Build
#   2. Create a trigger for pushes to main branch
#   3. Set substitution variables or use Secret Manager
#
# =============================================================================

substitutions:
  _REGION: us-central1
  _REPO_NAME: csnavigator
  _BACKEND_SERVICE: csnavigator-backend
  _FRONTEND_SERVICE: csnavigator-frontend
  _ADK_SERVICE: csnavigator-adk

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # =============================================================================
  # Step 1: Build ADK Agent Image
  # =============================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-adk'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/adk-agent:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/adk-agent:latest'
      - './adk_agent'

  # =============================================================================
  # Step 2: Build Backend Image
  # =============================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/backend:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/backend:latest'
      - './backend'

  # =============================================================================
  # Step 3: Build Frontend Image (runs in parallel with backend)
  # =============================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '--build-arg=VITE_API_BASE_URL='
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:latest'
      - './frontend'

  # =============================================================================
  # Step 4: Push all images to Artifact Registry
  # =============================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-adk'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/adk-agent']
    waitFor: ['build-adk']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/backend']
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend']
    waitFor: ['build-frontend']

  # =============================================================================
  # Step 5: Deploy ADK Agent to Cloud Run
  # =============================================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-adk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_ADK_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/adk-agent:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8080'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=300'
      - '--concurrency=80'
      - '--no-allow-unauthenticated'
      - '--service-account=csnavigator-backend@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID}'
    waitFor: ['push-adk']

  # =============================================================================
  # Step 6: Get ADK URL and Deploy Backend
  # =============================================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        ADK_URL=$(gcloud run services describe ${_ADK_SERVICE} --region=${_REGION} --format='value(status.url)')
        echo "ADK URL: $$ADK_URL"

        gcloud run deploy ${_BACKEND_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/backend:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --port=5000 \
          --memory=1Gi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=20 \
          --timeout=300 \
          --concurrency=100 \
          --allow-unauthenticated \
          --service-account=csnavigator-backend@${PROJECT_ID}.iam.gserviceaccount.com \
          --set-env-vars="USE_VERTEX_AGENT=true,ADK_BASE_URL=$$ADK_URL,ADK_APP_NAME=cs_navigator_unified,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},SMTP_HOST=smtp.gmail.com,SMTP_PORT=587,FROM_EMAIL=noreplyinavigator@gmail.com,APP_URL=https://cs.inavigator.ai,API_URL=https://api.inavigator.ai,ALLOW_TEST_EMAILS=false,ACCESS_TOKEN_EXPIRE_MINUTES=240,SHOW_DASHBOARD_LOGS=false" \
          --set-secrets="DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,ADMIN_EMAIL=ADMIN_EMAIL:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest"
        # NOTE: SMTP_USER, SMTP_PASS, and RESEARCH_SECRET must be set manually on the
        # Cloud Run service via console or: gcloud run services update csnavigator-backend
        #   --set-env-vars="SMTP_USER=noreplyinavigator@gmail.com,SMTP_PASS=<app-password>,RESEARCH_SECRET=<secret>"
        # TODO: Migrate to Secret Manager once API is enabled on the project
    waitFor: ['deploy-adk', 'push-backend']

  # =============================================================================
  # Step 7: Deploy Frontend to Cloud Run
  # =============================================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=60'
      - '--concurrency=200'
      - '--allow-unauthenticated'
    waitFor: ['push-frontend', 'deploy-backend']

  # =============================================================================
  # Step 8: Print deployment summary
  # =============================================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'summary'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "========================================="
        echo "Deployment Complete!"
        echo "========================================="
        echo "Frontend: $(gcloud run services describe ${_FRONTEND_SERVICE} --region=${_REGION} --format='value(status.url)')"
        echo "Backend:  $(gcloud run services describe ${_BACKEND_SERVICE} --region=${_REGION} --format='value(status.url)')"
        echo "ADK:      $(gcloud run services describe ${_ADK_SERVICE} --region=${_REGION} --format='value(status.url)')"
        echo "========================================="
    waitFor: ['deploy-frontend']

# Images to store in Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/adk-agent:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/adk-agent:latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/backend:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/backend:latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:latest'

timeout: 1800s
