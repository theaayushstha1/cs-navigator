name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-lint:
    name: Backend Lint & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -c "import main; print('Backend imports OK')"
      - run: python -c "import vertex_agent; print('Agent client OK')"
      - run: python -c "import cache; print('Cache module OK')"
      - run: python -c "from services.query_rewriter import is_likely_followup; print('Query rewriter OK')"
      - run: python -c "from services.course_context import build_course_context; print('Course context OK')"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  agent-check:
    name: ADK Agent Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adk_agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install google-adk==1.23.0
      - run: python -c "from cs_navigator_unified.agent import root_agent; print(f'Agent loaded: {root_agent.name}')"

  health-check:
    name: Production Health
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [backend-lint, frontend-build, agent-check]
    steps:
      - run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.inavigator.ai/health)
          echo "Backend health: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
      - run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cs.inavigator.ai)
          echo "Frontend health: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
